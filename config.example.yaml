# Seleya configuration. Copy to config.yaml and edit.
# The GitHub PAT is NOT set here; export GITHUB_TOKEN in the environment.

username: your-github-username   # used to compute the catch-all tab
ttlMinutes: 10                   # minutes before cached data is considered stale
syncConcurrency: 6               # how many repos to sync in parallel
bindAddress: 127.0.0.1           # do NOT expose publicly without external auth
port: 7920
allowedHosts: []                 # extra Host names to allow behind a proxy when bound to loopback
caseSensitive: false             # filters match case-insensitively unless true

forkAllowlist:
  - some-owner/a-fork-worth-keeping

tabs:
  - name: Shaka Project
    match:
      - org: shaka-project
    exclude:                       # remove specific repos from this tab
      - shaka-project/some-archived-helper
    groups:
      # Each filter dimension takes EITHER one matcher (an object) OR a list of
      # matchers. A list is ANDed: every matcher must hold. Both forms are valid;
      # use a list when you need AND. Within a matcher, include is "any of".
      - name: Needs triage
        filter:
          type: issue
          labels: { exclude: [triaged] }          # object form: a single matcher
      - name: Security, not frontend
        filter:
          labels:                                  # list form: matchers are ANDed
            - include: [security, UX]              #   has security or UX
            - exclude: [frontend]                  #   and not frontend
      - name: High priority
        filter:
          fields:
            - name: Priority
              include: [High, Critical]
      - name: Dependabot
        filter:
          type: pull_request
          author: { like: '%bot%' }

  - name: Mixed
    match:
      - org: some-org
      - repos: [another-owner/foo, another-owner/bar]

  - name: Personal
    match:
      - catchAll: true
    exclude:                       # works on the catch-all too
      - your-github-username/scratch-repo
