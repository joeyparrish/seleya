<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seleya</title>
    <!-- Resolve the Mantine color scheme before first paint so the page does not
         flash light/unstyled before the dark theme applies. Mirrors what
         @mantine/core's ColorSchemeScript emits; inlined here because this is a
         client-only SPA where rendering that component runs too late. -->
    <script>
      try {
        var stored = window.localStorage.getItem("mantine-color-scheme-value");
        var scheme =
          stored === "light" || stored === "dark" || stored === "auto" ? stored : "auto";
        var computed =
          scheme !== "auto"
            ? scheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>
    <!-- Paint the body background immediately, keyed on the attribute set above.
         Mantine's stylesheet is render-blocking and downloads after this inline
         style, so without this the browser shows its default white canvas until
         the CSS lands. These values mirror Mantine's default body colors
         (--mantine-color-body: #fff light, dark-7 #242424). -->
    <style>
      html { background-color: #fff; }
      html[data-mantine-color-scheme="dark"] { background-color: #242424; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
